<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="20 Week">
<meta name="theme-color" content="#0c0c0c">
<title>20 Week Program</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%230c0c0c'/><text x='90' y='100' font-family='-apple-system,Helvetica' font-size='60' font-weight='900' fill='%23f5a623' text-anchor='middle' dominant-baseline='middle'>20</text><text x='90' y='140' font-family='-apple-system,Helvetica' font-size='22' font-weight='700' fill='%23f5a623' text-anchor='middle'>WEEK</text></svg>">
<style>
  :root {
    --bg: #0c0c0c;
    --bg-card: #1a1a1a;
    --bg-card-hover: #222;
    --accent: #f5a623;
    --accent-rust: #c25e2a;
    --text: #f0f0f0;
    --text-dim: #888;
    --text-muted: #555;
    --green: #4caf50;
    --green-dim: #2e6b30;
    --red: #e53935;
    --border: #2a2a2a;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 16px; line-height: 1.4; overscroll-behavior-y: contain; }
  body { padding-top: var(--safe-top); padding-bottom: calc(var(--safe-bottom) + 100px); min-height: 100vh; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  input, select { font: inherit; color: var(--text); background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  input[type=number] { width: 80px; -moz-appearance: textfield; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  /* Header */
  header { padding: 16px 16px 0; }
  .title-row { display: flex; align-items: center; justify-content: space-between; }
  .title { font-size: 13px; font-weight: 800; letter-spacing: 0.15em; color: var(--accent); }
  .gear { font-size: 22px; padding: 4px 8px; }
  .meta { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  .meta strong { color: var(--text); font-weight: 700; }

  /* Day tabs */
  .tabs { display: flex; gap: 4px; padding: 12px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex: 1; min-width: 44px; text-align: center; padding: 10px 4px; border-radius: 8px;
    background: var(--bg-card); color: var(--text-dim); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; }
  .tab .dow { font-size: 14px; color: var(--text); }
  .tab.today { outline: 1px solid var(--accent); }
  .tab.active { background: var(--accent); color: #0c0c0c; }
  .tab.active .dow { color: #0c0c0c; }
  .tab.complete::after { content: "✓"; display: block; color: var(--green); font-size: 11px; margin-top: 2px; }

  /* Main */
  main { padding: 0 16px; }
  .day-header { display: flex; align-items: baseline; justify-content: space-between; margin: 8px 0 4px; }
  .day-title { font-size: 22px; font-weight: 900; letter-spacing: 0.05em; }
  .day-sub { font-size: 12px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }
  .rpe-pill { display: inline-block; background: var(--accent-rust); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }

  .deload-banner { background: #2a2410; border: 1px solid var(--accent); border-radius: 8px;
    padding: 10px 12px; margin: 8px 0; font-size: 13px; color: var(--accent); }
  .deload-banner strong { letter-spacing: 0.1em; }

  /* Exercise card */
  .ex { background: var(--bg-card); border-radius: 10px; padding: 12px; margin: 10px 0;
    border: 1px solid var(--border); transition: border-color 150ms; }
  .ex.complete { border-color: var(--green-dim); background: #14201a; }
  .ex-name { font-size: 16px; font-weight: 800; letter-spacing: 0.02em; margin: 0 0 2px; }
  .ex-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
  .ex-meta .dot { color: var(--text-muted); margin: 0 6px; }
  .ex-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .weight-input { display: flex; align-items: center; gap: 6px; }
  .weight-input label { font-size: 12px; color: var(--text-dim); }
  .weight-input input { width: 70px; text-align: center; font-weight: 700; }
  .weight-input .unit { font-size: 12px; color: var(--text-dim); }
  .reps-input label { font-size: 12px; color: var(--text-dim); margin-right: 6px; }
  .reps-input input { width: 60px; text-align: center; font-weight: 700; }
  .bw-tag { background: #2a1a10; color: var(--accent); padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; }

  .set-dots { display: flex; gap: 8px; margin-top: 10px; }
  .dot-btn { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--border);
    background: transparent; display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-weight: 800; font-size: 13px; transition: all 120ms; }
  .dot-btn.done { background: var(--green); color: #fff; border-color: var(--green); }
  .dot-btn:active { transform: scale(0.92); }

  .ex-notes { width: 100%; margin-top: 8px; background: #0f0f0f; border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px; font-size: 13px; color: var(--text-dim); }
  .ex-notes:focus { color: var(--text); }

  /* Conditioning block */
  .cond { background: var(--bg-card); border-radius: 10px; padding: 14px; margin: 10px 0;
    border: 1px solid var(--border); }
  .cond.complete { border-color: var(--green-dim); background: #14201a; }
  .cond-label { font-size: 11px; color: var(--accent); font-weight: 800; letter-spacing: 0.1em; }
  .cond-modality { font-size: 14px; font-weight: 700; margin: 4px 0 2px; }
  .cond-workout { font-size: 18px; font-weight: 800; line-height: 1.3; margin: 4px 0 12px; }
  .cond-toggle { display: inline-block; padding: 8px 16px; background: var(--accent);
    color: #000; border-radius: 8px; font-weight: 800; letter-spacing: 0.08em; font-size: 12px; }
  .cond-toggle.done { background: var(--green); color: #fff; }

  /* Rest day */
  .rest-day { padding: 32px 16px; text-align: center; }
  .rest-day .icon { font-size: 48px; }
  .rest-day .msg { font-size: 14px; color: var(--text-dim); margin-top: 8px; line-height: 1.5; }

  /* Rest timer floating */
  .timer { position: fixed; left: 16px; right: 16px; bottom: calc(16px + var(--safe-bottom));
    background: var(--bg-card); border: 1px solid var(--accent); border-radius: 12px;
    padding: 14px 18px; display: none; align-items: center; justify-content: space-between;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 50; }
  .timer.active { display: flex; }
  .timer-left { display: flex; align-items: center; gap: 14px; }
  .timer-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.15em; font-weight: 700; }
  .timer-time { font-size: 28px; font-weight: 900; font-variant-numeric: tabular-nums; color: var(--accent); }
  .timer.warn .timer-time { color: var(--red); }
  .timer-actions { display: flex; gap: 8px; }
  .timer-btn { padding: 8px 12px; border-radius: 8px; background: var(--border);
    color: var(--text); font-weight: 700; font-size: 12px; letter-spacing: 0.05em; }
  .timer-btn.primary { background: var(--accent); color: #000; }

  /* Settings drawer */
  .drawer-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 60;
    opacity: 0; pointer-events: none; transition: opacity 200ms; }
  .drawer-bg.open { opacity: 1; pointer-events: auto; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 90%; max-width: 420px;
    background: var(--bg); z-index: 61; transform: translateX(100%); transition: transform 220ms cubic-bezier(.2,.7,.3,1);
    overflow-y: auto; padding: 16px; padding-top: calc(16px + var(--safe-top));
    padding-bottom: calc(40px + var(--safe-bottom));
    border-left: 1px solid var(--border); }
  .drawer.open { transform: translateX(0); }
  .drawer h2 { font-size: 14px; letter-spacing: 0.15em; color: var(--accent); margin: 18px 0 8px; }
  .drawer h2:first-child { margin-top: 0; }
  .drawer .row { display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border); }
  .drawer .row label { font-size: 14px; }
  .drawer .row input[type=number] { width: 90px; text-align: right; }
  .drawer .btn { display: block; width: 100%; padding: 12px; margin: 8px 0;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    text-align: center; font-weight: 700; font-size: 14px; }
  .drawer .btn.danger { color: var(--red); border-color: var(--red); }
  .drawer-close { position: absolute; top: calc(8px + var(--safe-top)); right: 8px;
    font-size: 24px; padding: 8px 12px; }
  .small { font-size: 12px; color: var(--text-dim); }

  /* Inline pre-program / post-program states */
  .empty-state { padding: 40px 16px; text-align: center; }
  .empty-state h3 { font-size: 18px; letter-spacing: 0.05em; }
  .empty-state p { color: var(--text-dim); font-size: 14px; }

  /* Toast */
  .toast { position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(120px + var(--safe-bottom)); background: var(--green); color: #fff;
    padding: 10px 16px; border-radius: 20px; font-weight: 700; font-size: 13px;
    opacity: 0; transition: opacity 200ms; pointer-events: none; z-index: 70; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <div>
      <div class="title">20 WEEK PROGRAM</div>
      <div class="meta" id="meta"></div>
    </div>
    <button class="gear" id="open-settings" aria-label="Settings">⚙️</button>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>

<main id="main"></main>

<div class="timer" id="timer">
  <div class="timer-left">
    <div>
      <div class="timer-label">REST</div>
      <div class="timer-time" id="timer-time">1:30</div>
    </div>
  </div>
  <div class="timer-actions">
    <button class="timer-btn" id="timer-add">+30</button>
    <button class="timer-btn primary" id="timer-skip">SKIP</button>
  </div>
</div>

<div class="drawer-bg" id="drawer-bg"></div>
<aside class="drawer" id="drawer">
  <button class="drawer-close" id="close-settings">✕</button>
  <h2>STARTING WEIGHTS (LBS)</h2>
  <div id="starting-weights"></div>
  <h2>SETTINGS</h2>
  <div class="row"><label>Rest timer (sec)</label><input type="number" id="rest-secs" min="0" step="15"></div>
  <div class="row"><label>Override current week</label>
    <select id="week-override"></select>
  </div>
  <p class="small">Program starts <strong id="start-date-display"></strong>. The app auto-detects today's week from this date — override only if you started early/late.</p>
  <h2>DATA</h2>
  <button class="btn" id="export-data">Export progress (JSON)</button>
  <button class="btn" id="import-data">Import progress (JSON)</button>
  <input type="file" id="import-file" accept="application/json" style="display:none">
  <button class="btn danger" id="reset-data">Reset all progress</button>
</aside>

<div class="toast" id="toast"></div>

<script>
"use strict";

// ============================================================
// PROGRAM DATA
// ============================================================
const PROGRAM_START = "2026-05-04"; // Monday W1 of Meso 1

const MESOS = [
  { idx: 1, name: "Foundation",     workRPE: "RPE 7",   deloadRPE: "RPE 5–6" },
  { idx: 2, name: "Accumulation",   workRPE: "RPE 7–8", deloadRPE: "RPE 5–6" },
  { idx: 3, name: "Intensification",workRPE: "RPE 8",   deloadRPE: "RPE 5–6" },
  { idx: 4, name: "Peak Volume",    workRPE: "RPE 8–9", deloadRPE: "RPE 5–6" },
  { idx: 5, name: "Realization",    workRPE: "RPE 9",   deloadRPE: "RPE 5–6" },
];

// id MUST be stable: used as localStorage key
// rb/rt = rep bottom/top, inc = increment lbs
const EXERCISES = {
  "bench":         { name: "BB Bench Press",          rb: 6,  rt: 8,  inc: 5, defaultStart: 135 },
  "ohp":           { name: "BB Shoulder Press",       rb: 6,  rt: 8,  inc: 5, defaultStart: 65 },
  "dbIncline":     { name: "DB Incline Bench Press",  rb: 8,  rt: 10, inc: 5, defaultStart: 30 },
  "cableTri":      { name: "Cable Tricep Extension",  rb: 10, rt: 12, inc: 5, defaultStart: 10 },
  "lateralRaise":  { name: "DB Lateral Raise",        rb: 12, rt: 15, inc: 5, defaultStart: 15 },
  "dbCalf":        { name: "DB Calf Raise",           rb: 12, rt: 15, inc: 5, defaultStart: 30 },
  "row":           { name: "BB Bent-Over Row",        rb: 6,  rt: 8,  inc: 5 },
  "chinUp":        { name: "Weighted Chin-Up",        rb: 6,  rt: 8,  inc: 5 },
  "hammerCurl":    { name: "DB Hammer Curl",          rb: 10, rt: 12, inc: 5 },
  "bicepCurl":     { name: "DB Bicep Curl",           rb: 10, rt: 12, inc: 5 },
  "cableCrunch":   { name: "Cable Crunch",            rb: 12, rt: 15, inc: 5 },
  "bss":           { name: "BB Bulgarian Split Squat",rb: 8,  rt: 10, inc: 5 },
  "hipThrust":     { name: "DB Hip Thrust",           rb: 10, rt: 12, inc: 5 },
  "stepUp":        { name: "DB Step-Up",              rb: 8,  rt: 10, inc: 5 },
  "nordic":        { name: "Nordic Curl",             rb: 5,  rt: 8,  inc: 5 },
  "slCalf":        { name: "Single-Leg DB Calf Raise",rb: 12, rt: 15, inc: 5 },
  "dbInclinePress":{ name: "DB Incline Press",        rb: 8,  rt: 10, inc: 5 },
  "saRow":         { name: "DB Single-Arm Row",       rb: 8,  rt: 10, inc: 5 },
  "goblet":        { name: "Goblet Squat",            rb: 10, rt: 12, inc: 5 },
  "slRDL":         { name: "Single-Leg RDL",          rb: 8,  rt: 10, inc: 5 },
  "crossover":     { name: "Cable Crossover",         rb: 10, rt: 12, inc: 5 },
};

const BW_EXERCISES = {
  "facePull":   { name: "Banded Face Pull",                 reps: "15–20" },
  "hangingLeg": { name: "Hanging Straight Leg Hip Raise",   reps: "10–15" },
  "pallof":     { name: "Pallof Press",                     reps: "10/side" },
};

// rt-style display rep ranges (with /leg, /arm suffixes where appropriate)
const REP_DISPLAY = {
  "bench": "6–8", "ohp": "6–8", "dbIncline": "8–10", "cableTri": "10–12",
  "lateralRaise": "12–15", "dbCalf": "12–15",
  "row": "6–8", "chinUp": "6–8", "hammerCurl": "10–12", "bicepCurl": "10–12", "cableCrunch": "12–15",
  "bss": "8–10/leg", "hipThrust": "10–12", "stepUp": "8–10/leg", "nordic": "5–8",
  "slCalf": "12–15/leg",
  "dbInclinePress": "8–10", "saRow": "8–10/arm", "goblet": "10–12",
  "slRDL": "8–10/leg", "crossover": "10–12",
};

const DAYS = {
  push: { label: "Push Day",      sub: "Chest · Shoulders · Triceps", exercises: ["bench","ohp","dbIncline","cableTri","lateralRaise","dbCalf"] },
  pull: { label: "Pull Day",      sub: "Back · Biceps · Core",       exercises: ["row","chinUp","facePull","hammerCurl","bicepCurl","cableCrunch"] },
  legs: { label: "Legs Day",      sub: "Quads · Glutes · Hams",      exercises: ["bss","hipThrust","stepUp","nordic","slCalf","hangingLeg"] },
  full: { label: "Frequency Day", sub: "Full Body · Hypertrophy 2x", exercises: ["dbInclinePress","saRow","goblet","slRDL","crossover","pallof"] },
};

// Conditioning data: indexed by global week (1..20)
const CONDITIONING = [
  /* W1  */ { friPM: {label:"Endurance",       text:"30 min steady-state @ conversational pace"}, sat: {label:"Speed/Threshold", text:"8 x 20s max effort / 40s easy"},          sun: {label:"Endurance",       text:"25 min steady-state @ conversational pace"} },
  /* W2  */ { friPM: {label:"Endurance",       text:"35 min steady-state @ conversational pace"}, sat: {label:"MAP",             text:"3 x 5 min @ 85–90% effort / 3 min rest"}, sun: {label:"Anaerobic",       text:"6 x 30s all-out / 3 min rest"} },
  /* W3  */ { friPM: {label:"Speed/Threshold", text:"10 x 20s max effort / 40s easy"},            sat: {label:"Interval",        text:"5 x 2 min hard / 2 min easy"},            sun: {label:"Anaerobic",       text:"7 x 30s all-out / 3 min rest"} },
  /* W4  */ { friPM: {label:"Endurance",       text:"40 min steady-state @ conversational pace"}, sat: {label:"MAP",             text:"3 x 6 min @ 85–90% effort / 3 min rest"}, sun: {label:"Speed/Threshold", text:"12 x 20s max effort / 40s easy"} },
  /* W5  */ { friPM: {label:"Endurance",       text:"30 min steady-state @ conversational pace"}, sat: {label:"Anaerobic",       text:"8 x 30s all-out / 3 min rest"},           sun: {label:"MAP",             text:"4 x 5 min @ 85–90% effort / 3 min rest"} },
  /* W6  */ { friPM: {label:"Endurance",       text:"25 min steady-state @ conversational pace"}, sat: {label:"Speed/Threshold", text:"6 x 20s max effort / 40s easy"},          sun: {label:"Interval",        text:"4 x 2 min hard / 2 min easy"} },
  /* W7  */ { friPM: {label:"Endurance",       text:"35 min steady-state @ conversational pace"}, sat: {label:"MAP",             text:"2 x 5 min @ 85–90% effort / 3 min rest"}, sun: {label:"Anaerobic",       text:"5 x 30s all-out / 3 min rest"} },
  /* W8  */ { friPM: {label:"Speed/Threshold", text:"10 x 25s max effort / 35s easy"},            sat: {label:"Endurance",       text:"30 min steady-state @ conversational pace"}, sun: {label:"Anaerobic",     text:"6 x 35s all-out / 3 min rest"} },
  /* W9  */ { friPM: {label:"Endurance",       text:"40 min steady-state @ conversational pace"}, sat: {label:"MAP",             text:"3 x 7 min @ 85–90% effort / 3 min rest"}, sun: {label:"Speed/Threshold", text:"12 x 25s max effort / 35s easy"} },
  /* W10 */ { friPM: {label:"Interval",        text:"6 x 2 min hard / 2 min easy"},               sat: {label:"Anaerobic",       text:"7 x 35s all-out / 3 min rest"},           sun: {label:"MAP",             text:"4 x 6 min @ 85–90% effort / 3 min rest"} },
  /* W11 */ { friPM: {label:"Endurance",       text:"45 min steady-state @ conversational pace"}, sat: {label:"Speed/Threshold", text:"14 x 25s max effort / 35s easy"},         sun: {label:"Endurance",       text:"35 min steady-state @ conversational pace"} },
  /* W12 */ { friPM: {label:"Endurance",       text:"30 min steady-state @ conversational pace"}, sat: {label:"MAP",             text:"4 x 7 min @ 85–90% effort / 3 min rest"}, sun: {label:"Anaerobic",       text:"8 x 35s all-out / 3 min rest"} },
  /* W13 */ { friPM: {label:"Speed/Threshold", text:"8 x 25s max effort / 35s easy"},             sat: {label:"Interval",        text:"4 x 2.5 min hard / 2.5 min easy"},        sun: {label:"Anaerobic",       text:"5 x 35s all-out / 3 min rest"} },
  /* W14 */ { friPM: {label:"Endurance",       text:"40 min steady-state @ conversational pace"}, sat: {label:"MAP",             text:"2 x 6 min @ 85–90% effort / 3 min rest"}, sun: {label:"Speed/Threshold", text:"10 x 30s max effort / 30s easy"} },
  /* W15 */ { friPM: {label:"Endurance",       text:"35 min steady-state @ conversational pace"}, sat: {label:"Anaerobic",       text:"6 x 40s all-out / 3 min rest"},           sun: {label:"MAP",             text:"3 x 8 min @ 85–90% effort / 3 min rest"} },
  /* W16 */ { friPM: {label:"Endurance",       text:"45 min steady-state @ conversational pace"}, sat: {label:"Speed/Threshold", text:"12 x 30s max effort / 30s easy"},         sun: {label:"Interval",        text:"6 x 2.5 min hard / 2.5 min easy"} },
  /* W17 */ { friPM: {label:"Endurance",       text:"50 min steady-state @ conversational pace"}, sat: {label:"MAP",             text:"4 x 8 min @ 85–90% effort / 3 min rest"}, sun: {label:"Anaerobic",       text:"7 x 40s all-out / 3 min rest"} },
  /* W18 */ { friPM: {label:"Speed/Threshold", text:"14 x 30s max effort / 30s easy"},            sat: {label:"Endurance",       text:"40 min steady-state @ conversational pace"}, sun: {label:"Anaerobic",     text:"8 x 40s all-out / 3 min rest"} },
  /* W19 */ { friPM: {label:"Endurance",       text:"30 min steady-state @ conversational pace"}, sat: {label:"MAP",             text:"5 x 7 min @ 85–90% effort / 3 min rest"}, sun: {label:"Speed/Threshold", text:"8 x 30s max effort / 30s easy"} },
  /* W20 */ { friPM: {label:"Interval",        text:"4 x 3 min hard / 3 min easy"},               sat: {label:"Anaerobic",       text:"5 x 40s all-out / 3 min rest"},           sun: {label:"MAP",             text:"2 x 8 min @ 85–90% effort / 3 min rest"} },
];

// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = "wp-state-v1";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  } catch (e) {
    console.warn("State load failed, resetting", e);
    return defaultState();
  }
}
function defaultState() {
  const sw = {};
  for (const [id, ex] of Object.entries(EXERCISES)) {
    if (ex.defaultStart != null) sw[id] = ex.defaultStart;
  }
  return { startingWeights: sw, sessions: {}, settings: { restSecs: 90, weekOverride: null } };
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = loadState();

// ============================================================
// DATE / WEEK MATH
// ============================================================
function ymdToDate(s) { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); }
function dateToYMD(d) { return d.toISOString().slice(0,10); }
function diffDays(a, b) { return Math.floor((a - b) / 86400000); }

function getCurrentWeek() {
  if (state.settings.weekOverride) return state.settings.weekOverride;
  const today = new Date(); today.setHours(0,0,0,0);
  const start = ymdToDate(PROGRAM_START);
  const days = diffDays(today, start);
  if (days < 0) return 0;          // before start
  if (days >= 140) return 21;      // after end
  return Math.floor(days / 7) + 1; // 1..20
}
function weekToMeso(w) {
  return { mesoIdx: Math.floor((w - 1) / 4) + 1, weekInMeso: ((w - 1) % 4) + 1 };
}
function isDeload(weekInMeso) { return weekInMeso === 4; }

// JS Date getDay: Sun=0..Sat=6. We map to our day key.
const DOW_TO_DAY_KEY = ["sun","mon","tue","wed","thu","fri","sat"];
const DAY_KEY_TO_LABEL = { mon: "Mon", tue: "Tue", wed: "Wed", thu: "Thu", fri: "Fri", sat: "Sat", sun: "Sun" };
const DAY_KEY_TO_LIFT  = { mon: "push", tue: "pull", wed: null, thu: "legs", fri: "full", sat: null, sun: null };

function todayDayKey() { return DOW_TO_DAY_KEY[new Date().getDay()]; }

// ============================================================
// PROGRESSION CALC
// ============================================================
function sessionKey(meso, week, day, exId) { return `M${meso}.W${week}.${day}.${exId}`; }

function getSession(meso, week, day, exId) {
  return state.sessions[sessionKey(meso, week, day, exId)] || null;
}

function progressionStep(prevWeight, prevReps, ex) {
  if (prevReps == null || prevReps === 0) return prevWeight;
  if (prevReps >= ex.rt) return prevWeight + ex.inc;
  if (prevReps < ex.rb)  return Math.max(prevWeight - ex.inc, 0);
  return prevWeight;
}

// Compute the suggested weight for an exercise on a given (meso, week-in-meso, day).
// Mirrors the spreadsheet formula structure exactly.
function getSuggestedWeight(meso, weekInMeso, day, exId) {
  const ex = EXERCISES[exId];
  if (!ex) return null;
  const start = state.startingWeights[exId];

  // Deload: 80% of W3 same meso same exercise (or starting weight if none)
  if (weekInMeso === 4) {
    const w3 = getSession(meso, 3, day, exId);
    const base = (w3 && w3.weight != null) ? w3.weight : (start ?? 0);
    return Math.round(base * 0.8);
  }
  // M1 W1: starting weight
  if (meso === 1 && weekInMeso === 1) return start ?? null;

  // M>1 W1: progress from prior meso W3
  if (weekInMeso === 1) {
    const prev = getSession(meso - 1, 3, day, exId);
    if (!prev || prev.weight == null) return start ?? null;
    return progressionStep(prev.weight, prev.reps, ex);
  }

  // W2 or W3 within meso: progress from prior week
  const prev = getSession(meso, weekInMeso - 1, day, exId);
  if (!prev || prev.weight == null) {
    // fall back to recursion if prior session never populated
    return getSuggestedWeight(meso, weekInMeso - 1, day, exId);
  }
  return progressionStep(prev.weight, prev.reps, ex);
}

function ensureSession(meso, week, day, exId) {
  const k = sessionKey(meso, week, day, exId);
  if (!state.sessions[k]) {
    const ex = EXERCISES[exId];
    const isBW = !ex;
    const targetSets = isDeload(((week - 1) % 4) + 1) ? 2 : 3;
    state.sessions[k] = {
      weight: isBW ? null : getSuggestedWeight(meso, ((week - 1) % 4) + 1, day, exId),
      reps: null,
      sets: Array(targetSets).fill(false),
      notes: "",
    };
  }
  return state.sessions[k];
}

// ============================================================
// SELECTION STATE
// ============================================================
let selectedDayKey = todayDayKey();

// ============================================================
// RENDERING
// ============================================================
const $ = (s, root = document) => root.querySelector(s);
const $$ = (s, root = document) => Array.from(root.querySelectorAll(s));

function renderHeader() {
  const w = getCurrentWeek();
  const meta = $("#meta");
  if (w === 0) {
    meta.innerHTML = `Program starts <strong>${formatDate(PROGRAM_START)}</strong>`;
  } else if (w > 20) {
    meta.innerHTML = `<strong>Program complete</strong>`;
  } else {
    const { mesoIdx, weekInMeso } = weekToMeso(w);
    const meso = MESOS[mesoIdx - 1];
    const tag = isDeload(weekInMeso) ? " · DELOAD" : "";
    meta.innerHTML = `Week <strong>${w}</strong> of 20 · ${meso.name}${tag}`;
  }
}

function renderTabs() {
  const dayKeys = ["mon","tue","wed","thu","fri","sat","sun"];
  const today = todayDayKey();
  const w = getCurrentWeek();
  const tabs = $("#tabs");
  tabs.innerHTML = "";
  for (const k of dayKeys) {
    const t = document.createElement("button");
    t.className = "tab" + (k === today ? " today" : "") + (k === selectedDayKey ? " active" : "");
    t.innerHTML = `<div>${DAY_KEY_TO_LABEL[k]}</div><div class="dow">${dayLabelShort(k)}</div>`;
    if (w >= 1 && w <= 20 && isDayComplete(k, w)) t.classList.add("complete");
    t.onclick = () => { selectedDayKey = k; renderAll(); };
    tabs.appendChild(t);
  }
}
function dayLabelShort(key) {
  return { mon: "PUSH", tue: "PULL", wed: "REST", thu: "LEGS", fri: "FULL", sat: "BIKE", sun: "BIKE" }[key];
}
function formatDate(s) {
  const d = ymdToDate(s);
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

function renderMain() {
  const main = $("#main");
  main.innerHTML = "";
  const w = getCurrentWeek();

  if (w === 0) {
    main.innerHTML = `<div class="empty-state"><h3>NOT STARTED YET</h3><p>Program kicks off ${formatDate(PROGRAM_START)}.</p></div>`;
    return;
  }
  if (w > 20) {
    main.innerHTML = `<div class="empty-state"><h3>PROGRAM COMPLETE 🎯</h3><p>20 weeks done. Reset to run it back, or use the override to revisit any week.</p></div>`;
    return;
  }

  const { mesoIdx, weekInMeso } = weekToMeso(w);
  const meso = MESOS[mesoIdx - 1];
  const rpe = isDeload(weekInMeso) ? meso.deloadRPE : meso.workRPE;
  const dayKey = selectedDayKey;
  const liftKey = DAY_KEY_TO_LIFT[dayKey];

  // Wed = pure rest
  if (dayKey === "wed") {
    main.innerHTML = `<div class="rest-day"><div class="icon">😌</div><h2 class="day-title">REST</h2><div class="msg">Active recovery, mobility, or Pilates.<br>Eat. Sleep. Hydrate.</div></div>`;
    return;
  }

  // Sat / Sun = conditioning only
  if (dayKey === "sat" || dayKey === "sun") {
    const cond = CONDITIONING[w - 1];
    const block = cond ? cond[dayKey] : null;
    const title = (dayKey === "sat" ? "Sat" : "Sun") + " Conditioning";
    renderHeaderRow(main, title, null, weekInMeso, block ? block.label : "");
    renderConditioning(main, w, dayKey);
    return;
  }

  // Friday: Full Body lift + PM endurance ride
  if (dayKey === "fri") {
    renderHeaderRow(main, DAYS.full.label, rpe, weekInMeso);
    renderLiftDay(main, w, mesoIdx, weekInMeso, "full", isDeload(weekInMeso));
    const friPMHeader = document.createElement("div");
    friPMHeader.style.marginTop = "20px";
    friPMHeader.innerHTML = `<div class="day-sub" style="color:var(--accent);font-weight:800;">FRIDAY PM CONDITIONING</div>`;
    main.appendChild(friPMHeader);
    renderConditioning(main, w, "fri");
    return;
  }

  // Mon / Tue / Thu: lift only
  if (liftKey) {
    renderHeaderRow(main, DAYS[liftKey].label, rpe, weekInMeso, DAYS[liftKey].sub);
    renderLiftDay(main, w, mesoIdx, weekInMeso, liftKey, isDeload(weekInMeso));
    return;
  }
}

function renderHeaderRow(main, title, rpe, weekInMeso, sub) {
  const h = document.createElement("div");
  h.className = "day-header";
  h.innerHTML = `<div><div class="day-title">${title.toUpperCase()}</div>${sub ? `<div class="day-sub">${sub}</div>` : ""}</div>${rpe ? `<div class="rpe-pill">${rpe}</div>` : ""}`;
  main.appendChild(h);
  if (isDeload(weekInMeso)) {
    const banner = document.createElement("div");
    banner.className = "deload-banner";
    banner.innerHTML = `<strong>DELOAD WEEK</strong> · sets cut to 2, weight ~80% of last working week, leave reps in the tank.`;
    main.appendChild(banner);
  }
}

function renderLiftDay(main, w, meso, weekInMeso, liftKey, deload) {
  const day = DAYS[liftKey];
  for (const exId of day.exercises) {
    if (BW_EXERCISES[exId]) {
      main.appendChild(renderBWCard(meso, w, liftKey, exId, deload));
    } else {
      main.appendChild(renderLiftCard(meso, w, liftKey, exId, deload));
    }
  }
}

function renderLiftCard(meso, week, day, exId, deload) {
  const ex = EXERCISES[exId];
  const sess = ensureSession(meso, week, day, exId);
  // Re-suggest weight if user has never confirmed it (weight-null state)
  if (sess.weight == null) {
    sess.weight = getSuggestedWeight(meso, ((week - 1) % 4) + 1, day, exId);
    saveState();
  }
  const card = document.createElement("div");
  card.className = "ex" + (isExerciseComplete(sess) ? " complete" : "");
  card.innerHTML = `
    <div class="ex-name">${ex.name}</div>
    <div class="ex-meta">${REP_DISPLAY[exId] || `${ex.rb}–${ex.rt}`} reps<span class="dot">·</span>${sess.sets.length} sets${deload ? '<span class="dot">·</span>DELOAD' : ''}</div>
    <div class="ex-row">
      <div class="weight-input"><label>Weight</label><input type="number" inputmode="decimal" step="2.5" data-w="${exId}" value="${sess.weight ?? ''}"><span class="unit">lbs</span></div>
      <div class="reps-input"><label>Lowest reps</label><input type="number" inputmode="numeric" data-r="${exId}" value="${sess.reps ?? ''}"></div>
    </div>
    <div class="set-dots" data-dots="${exId}">
      ${sess.sets.map((d,i) => `<button class="dot-btn${d ? ' done' : ''}" data-set="${i}">${i+1}</button>`).join('')}
    </div>
    <input class="ex-notes" placeholder="Notes" data-n="${exId}" value="${escapeHtml(sess.notes || '')}">
  `;

  card.querySelector(`[data-w="${exId}"]`).addEventListener('change', (e) => {
    const v = parseFloat(e.target.value);
    sess.weight = isNaN(v) ? null : v; saveState();
  });
  card.querySelector(`[data-r="${exId}"]`).addEventListener('change', (e) => {
    const v = parseInt(e.target.value, 10);
    sess.reps = isNaN(v) ? null : v;
    saveState(); renderTabs(); maybeMarkCardComplete(card, sess);
  });
  card.querySelector(`[data-n="${exId}"]`).addEventListener('change', (e) => {
    sess.notes = e.target.value; saveState();
  });
  card.querySelectorAll('.dot-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.set;
      const wasDone = sess.sets[i];
      sess.sets[i] = !wasDone;
      btn.classList.toggle('done', sess.sets[i]);
      saveState(); renderTabs(); maybeMarkCardComplete(card, sess);
      if (sess.sets[i] && !wasDone) startRestTimer();
    });
  });
  return card;
}

function renderBWCard(meso, week, day, exId, deload) {
  const ex = BW_EXERCISES[exId];
  const sess = ensureSession(meso, week, day, exId);
  const card = document.createElement("div");
  card.className = "ex" + (isExerciseComplete(sess) ? " complete" : "");
  card.innerHTML = `
    <div class="ex-name">${ex.name}</div>
    <div class="ex-meta">${ex.reps}<span class="dot">·</span>${sess.sets.length} sets<span class="dot">·</span><span class="bw-tag">BW / BAND</span></div>
    <div class="set-dots" data-dots="${exId}">
      ${sess.sets.map((d,i) => `<button class="dot-btn${d ? ' done' : ''}" data-set="${i}">${i+1}</button>`).join('')}
    </div>
    <input class="ex-notes" placeholder="Notes" data-n="${exId}" value="${escapeHtml(sess.notes || '')}">
  `;
  card.querySelector(`[data-n="${exId}"]`).addEventListener('change', (e) => {
    sess.notes = e.target.value; saveState();
  });
  card.querySelectorAll('.dot-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.set;
      const wasDone = sess.sets[i];
      sess.sets[i] = !wasDone;
      btn.classList.toggle('done', sess.sets[i]);
      saveState(); renderTabs(); maybeMarkCardComplete(card, sess);
      if (sess.sets[i] && !wasDone) startRestTimer();
    });
  });
  return card;
}

function renderConditioning(main, week, dayKey) {
  const cond = CONDITIONING[week - 1];
  if (!cond) return;
  const block = dayKey === "fri" ? cond.friPM : cond[dayKey];
  if (!block) return;
  const condKey = `M${weekToMeso(week).mesoIdx}.W${week}.${dayKey}.cond`;
  const sess = state.sessions[condKey] || { sets: [false], notes: "" };
  state.sessions[condKey] = sess;
  const done = sess.sets[0];
  const card = document.createElement("div");
  card.className = "cond" + (done ? " complete" : "");
  card.innerHTML = `
    <div class="cond-label">CONDITIONING · ${block.label.toUpperCase()}</div>
    <div class="cond-modality">Assault Bike</div>
    <div class="cond-workout">${block.text}</div>
    <button class="cond-toggle ${done ? 'done' : ''}">${done ? '✓ COMPLETE' : 'MARK COMPLETE'}</button>
    <input class="ex-notes" placeholder="Notes" value="${escapeHtml(sess.notes || '')}">
  `;
  card.querySelector('.cond-toggle').addEventListener('click', () => {
    sess.sets[0] = !sess.sets[0]; saveState(); renderAll();
  });
  card.querySelector('.ex-notes').addEventListener('change', (e) => {
    sess.notes = e.target.value; saveState();
  });
  main.appendChild(card);
}

function isExerciseComplete(sess) {
  if (!sess) return false;
  const allSetsDone = sess.sets.length > 0 && sess.sets.every(Boolean);
  if (BW_FROM_SESS(sess)) return allSetsDone;
  return allSetsDone && sess.reps != null;
}
// hack: BW sessions have weight===null and the matching exId comes from BW_EXERCISES.
// we treat any session whose weight has never been set AND reps null as a non-loaded one
function BW_FROM_SESS(sess) { return sess.weight == null && sess.reps == null; }

function isDayComplete(dayKey, week) {
  if (dayKey === "wed") return false;
  if (dayKey === "sat" || dayKey === "sun") {
    const k = `M${weekToMeso(week).mesoIdx}.W${week}.${dayKey}.cond`;
    const s = state.sessions[k]; return !!(s && s.sets[0]);
  }
  const liftKey = DAY_KEY_TO_LIFT[dayKey];
  if (!liftKey) return false;
  const day = DAYS[liftKey];
  const { mesoIdx } = weekToMeso(week);
  for (const exId of day.exercises) {
    const sess = getSession(mesoIdx, week, liftKey, exId);
    if (!sess) return false;
    if (BW_EXERCISES[exId]) {
      if (!sess.sets.every(Boolean)) return false;
    } else {
      if (!sess.sets.every(Boolean) || sess.reps == null) return false;
    }
  }
  // Friday also needs PM conditioning
  if (dayKey === "fri") {
    const k = `M${mesoIdx}.W${week}.fri.cond`;
    const s = state.sessions[k]; if (!(s && s.sets[0])) return false;
  }
  return true;
}

function maybeMarkCardComplete(card, sess) {
  card.classList.toggle("complete", isExerciseComplete(sess));
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// ============================================================
// REST TIMER
// ============================================================
let timerInterval = null;
let timerEnd = 0;

function startRestTimer() {
  const secs = state.settings.restSecs ?? 90;
  if (secs <= 0) return;
  timerEnd = Date.now() + secs * 1000;
  $("#timer").classList.add("active");
  updateTimerDisplay();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateTimerDisplay, 250);
}
function stopRestTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  $("#timer").classList.remove("active", "warn");
}
function updateTimerDisplay() {
  const remain = Math.max(0, Math.ceil((timerEnd - Date.now()) / 1000));
  const m = Math.floor(remain / 60), s = remain % 60;
  $("#timer-time").textContent = `${m}:${s.toString().padStart(2, "0")}`;
  $("#timer").classList.toggle("warn", remain <= 10);
  if (remain === 0) {
    if (navigator.vibrate) navigator.vibrate([200, 80, 200]);
    setTimeout(stopRestTimer, 1500);
  }
}
$("#timer-skip").onclick = stopRestTimer;
$("#timer-add").onclick = () => { timerEnd += 30000; updateTimerDisplay(); };

// ============================================================
// SETTINGS DRAWER
// ============================================================
const drawer = $("#drawer"), drawerBg = $("#drawer-bg");
function openDrawer() {
  buildSettingsContent();
  drawer.classList.add("open");
  drawerBg.classList.add("open");
}
function closeDrawer() {
  drawer.classList.remove("open");
  drawerBg.classList.remove("open");
  renderAll(); // pick up any starting weight changes
}
$("#open-settings").onclick = openDrawer;
$("#close-settings").onclick = closeDrawer;
drawerBg.onclick = closeDrawer;

function buildSettingsContent() {
  const container = $("#starting-weights");
  container.innerHTML = "";
  for (const [id, ex] of Object.entries(EXERCISES)) {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `<label>${ex.name}</label><input type="number" inputmode="decimal" step="2.5" data-sw="${id}" value="${state.startingWeights[id] ?? ''}">`;
    row.querySelector('input').addEventListener('change', (e) => {
      const v = parseFloat(e.target.value);
      state.startingWeights[id] = isNaN(v) ? null : v;
      saveState();
    });
    container.appendChild(row);
  }
  $("#rest-secs").value = state.settings.restSecs;
  $("#rest-secs").onchange = (e) => {
    state.settings.restSecs = parseInt(e.target.value, 10) || 0; saveState();
  };
  const sel = $("#week-override");
  sel.innerHTML = `<option value="">Auto (date-based)</option>` +
    Array.from({length: 20}, (_, i) => `<option value="${i+1}">Week ${i+1}</option>`).join('');
  sel.value = state.settings.weekOverride || "";
  sel.onchange = (e) => {
    const v = parseInt(e.target.value, 10);
    state.settings.weekOverride = isNaN(v) ? null : v;
    saveState(); renderAll();
  };
  $("#start-date-display").textContent = formatDate(PROGRAM_START);
}
$("#export-data").onclick = () => {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `workout-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast("Exported");
};
$("#import-data").onclick = () => $("#import-file").click();
$("#import-file").onchange = (e) => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const obj = JSON.parse(r.result);
      state = Object.assign(defaultState(), obj);
      saveState(); buildSettingsContent(); renderAll();
      toast("Imported");
    } catch (err) { alert("Invalid file"); }
  };
  r.readAsText(f);
};
$("#reset-data").onclick = () => {
  if (!confirm("Wipe ALL logged sets, reps, and starting weights? This cannot be undone.")) return;
  state = defaultState(); saveState(); buildSettingsContent(); renderAll();
  toast("Reset");
};

function toast(msg) {
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1400);
}

// ============================================================
// INIT
// ============================================================
function renderAll() {
  renderHeader();
  renderTabs();
  renderMain();
}
renderAll();

// Re-render every minute so the day rolls over at midnight
setInterval(() => {
  selectedDayKey = todayDayKey();
  renderAll();
}, 60_000);

// PWA service worker (offline). Inline blob worker so no separate file is needed.
if ('serviceWorker' in navigator) {
  // Single-file PWA — no SW for simplicity. localStorage handles persistence; the page
  // itself caches via standard browser HTTP cache once loaded.
}
</script>
</body>
